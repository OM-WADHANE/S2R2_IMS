<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – S2R2 Inventory Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; }
    @keyframes slideIn  { from { transform:translateX(400px); opacity:0 } to { transform:translateX(0); opacity:1 } }
    @keyframes slideOut { from { transform:translateX(0); opacity:1 } to { transform:translateX(400px); opacity:0 } }
    @keyframes fadeUp   { from { transform:translateY(24px); opacity:0 } to { transform:translateY(0); opacity:1 } }
    .login-box { animation: fadeUp .5s ease both; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center" style="background:linear-gradient(135deg,#005bea 0%,#00c6fb 100%)">

  <div class="login-box bg-white rounded-2xl shadow-2xl p-8 w-full max-w-sm mx-4">
    <!-- Logo -->
    <div class="flex justify-center mb-6">
      <img src="./s2r2-logo.jpg" alt="S2R2 Technologies" class="h-16 object-contain">
    </div>
    <h2 class="text-2xl font-bold text-center text-blue-700 mb-1">Welcome Back</h2>
    <p class="text-center text-gray-500 text-sm mb-6">Sign in to Inventory Management System</p>

    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="username">Username</label>
        <div class="relative">
          <i class="fas fa-user absolute left-3 top-3 text-gray-400"></i>
          <input id="username" type="text" placeholder="Enter username"
            class="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-xl bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:bg-white transition">
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="password">Password</label>
        <div class="relative">
          <i class="fas fa-lock absolute left-3 top-3 text-gray-400"></i>
          <input id="password" type="password" placeholder="Enter password"
            class="w-full pl-10 pr-10 py-2.5 border border-gray-200 rounded-xl bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:bg-white transition">
          <button id="togglePwd" type="button" class="absolute right-3 top-3 text-gray-400 hover:text-gray-600">
            <i class="fas fa-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>
      <button id="loginBtn"
        class="w-full py-3 rounded-xl font-bold text-white text-base transition active:scale-95"
        style="background:linear-gradient(90deg,#005bea,#00c6fb)">
        <span id="btnText">Sign In</span>
        <i id="btnSpinner" class="fas fa-spinner fa-spin ml-2 hidden"></i>
      </button>
    </div>

    <p class="text-center text-xs text-gray-400 mt-6">S2R2 Technologies &copy; 2025</p>
  </div>

  <script>
    const VALID_USERS = { 'admin':'admin123', 'user':'user123', 's2r2':'s2r2@2025' };

    // Already logged in → redirect
    if (localStorage.getItem('isLoggedIn') === 'true') location.href = 'index.html';

    document.getElementById('togglePwd').addEventListener('click', () => {
      const pwd = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      pwd.type = pwd.type === 'password' ? 'text' : 'password';
      icon.className = pwd.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
    });

    document.getElementById('loginBtn').addEventListener('click', doLogin);
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

    function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      if (!username || !password) { notify('Please enter both username and password', 'error'); return; }
      // Simulate brief loading
      const btnText = document.getElementById('btnText');
      const spinner = document.getElementById('btnSpinner');
      btnText.textContent = 'Signing in...';
      spinner.classList.remove('hidden');
      setTimeout(() => {
        if (VALID_USERS[username] && VALID_USERS[username] === password) {
          localStorage.setItem('isLoggedIn', 'true');
          localStorage.setItem('username', username);
          localStorage.setItem('loginTime', new Date().toISOString());
          notify('Login successful! Redirecting…', 'success');
          setTimeout(() => location.href = 'index.html', 800);
        } else {
          btnText.textContent = 'Sign In';
          spinner.classList.add('hidden');
          document.getElementById('password').value = '';
          notify('Invalid username or password', 'error');
        }
      }, 600);
    }

    function notify(msg, type) {
      const el = document.createElement('div');
      const colors = { success:'#10b981', error:'#ef4444', info:'#3b82f6' };
      el.style.cssText = `position:fixed;top:20px;right:20px;padding:14px 22px;border-radius:10px;
        background:${colors[type]||colors.info};color:#fff;font-weight:500;z-index:9999;
        box-shadow:0 4px 16px rgba(0,0,0,.2);animation:slideIn .3s ease`;
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => { el.style.animation='slideOut .3s ease'; setTimeout(()=>el.remove(),300); }, 3000);
    }
  </script>
</body>
</html>
