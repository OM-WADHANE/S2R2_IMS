<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raw Materials - Inventory Management System | S2R2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/sidebar.css">
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <header class="bg-blue-600 text-white shadow-md">
        <div class="flex items-center justify-between p-4 gap-3">
            <div class="flex items-center gap-2 md:gap-4 min-w-0">
                <button type="button" id="menuToggle" class="md:hidden text-white p-2 rounded-lg hover:bg-white/10" aria-label="Open menu">
                    <i class="fas fa-bars text-xl"></i>
                </button>
                <button type="button" id="sidebarCollapse" class="hidden md:flex items-center justify-center w-9 h-9 rounded-lg text-white/90 hover:bg-white/10 transition shrink-0" aria-expanded="true" aria-label="Collapse navigation" title="Collapse menu">
                    <i class="fas fa-chevron-left text-sm sidebar-collapse-icon-expanded"></i>
                    <i class="fas fa-chevron-right text-sm sidebar-collapse-icon-collapsed hidden"></i>
                </button>
                <div class="brand-logo" aria-label="S2R2 Logo" role="img"></div>
            </div>
            <h1 class="text-sm md:text-xl font-bold text-center flex-1">Inventory Management System | S2R2</h1>
            <div class="flex items-center gap-2">
                <button id="themeToggleBtn" class="theme-toggle-btn" title="Toggle theme" aria-label="Toggle theme">
                    <i id="themeToggleIcon" class="fas fa-moon"></i>
                </button>
                <div class="relative">
                    <button id="userMenuButton" class="flex items-center gap-2 bg-white/10 hover:bg-white/20 rounded-lg px-2 py-1">
                    <i class="fas fa-user-circle text-xl"></i>
                    <span class="hidden md:inline text-sm font-medium" id="username">Admin</span>
                    <i class="fas fa-chevron-down text-xs"></i>
                    </button>
                    <div id="userMenu" class="hidden absolute right-0 mt-2 w-40 bg-white text-gray-700 rounded-lg shadow-lg z-50">
                        <button id="logoutBtn" class="w-full text-left px-4 py-2 hover:bg-gray-100 rounded-lg text-sm">
                            <i class="fas fa-sign-out-alt mr-2"></i>Logout
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="flex flex-col md:flex-row">
        <!-- Sidebar -->
        <aside class="sidebar app-sidebar bg-white min-h-screen p-4 border-r shadow-sm">
            <div class="mb-8">
                <div class="flex justify-between items-center mb-6 gap-2 min-h-[1.75rem]">
                    <h2 class="sidebar-title text-lg font-semibold">Navigation</h2>
                    <button type="button" id="closeSidebar" class="md:hidden text-gray-500 p-1 rounded hover:bg-gray-100" aria-label="Close menu">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <nav aria-label="Main">
                    <ul class="space-y-2">
                        <li>
                            <a href="index.html" class="nav-link flex items-center p-3 rounded-lg hover:bg-gray-100" title="Dashboard">
                                <i class="fas fa-tachometer-alt nav-icon shrink-0 w-5 text-center mr-3"></i>
                                <span class="nav-label">Dashboard</span>
                            </a>
                        </li>
                        <li>
                            <a href="raw-materials.html" class="nav-link flex items-center p-3 rounded-lg bg-blue-50 text-blue-600" title="Raw Materials">
                                <i class="fas fa-truck nav-icon shrink-0 w-5 text-center mr-3"></i>
                                <span class="nav-label">Raw Materials</span>
                            </a>
                        </li>
                        <li>
                            <a href="finished-products.html" class="nav-link flex items-center p-3 rounded-lg hover:bg-gray-100" title="Finished Products">
                                <i class="fas fa-cube nav-icon shrink-0 w-5 text-center mr-3"></i>
                                <span class="nav-label">Finished Products</span>
                            </a>
                        </li>
                        <li>
                            <a href="client-base.html" class="nav-link flex items-center p-3 rounded-lg hover:bg-gray-100" title="Clients">
                                <i class="fas fa-users nav-icon shrink-0 w-5 text-center mr-3"></i>
                                <span class="nav-label">Clients</span>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-6">
            <div class="mb-6">
                <h2 class="text-2xl font-bold text-gray-800">Raw Materials Inventory</h2>
                <p class="text-gray-600">Complete list of all raw materials with details</p>
            </div>

            <!-- Search and Filter -->
            <div class="bg-white rounded-xl shadow-md p-6 mb-6">
                <div class="flex flex-col md:flex-row md:items-center gap-4">
                    <div class="flex-1">
                        <div class="relative">
                            <input id="searchInput" type="text" placeholder="Search materials..." 
                                class="w-full pl-10 pr-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                        </div>
                    </div>
                    <div>
                        <select id="categoryFilter" class="px-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">All Categories</option>
                            <option value="Electronics">Electronics</option>
                            <option value="Sensors">Sensors</option>
                            <option value="Components">Components</option>
                        </select>
                    </div>
                    <div>
                        <select id="statusFilter" class="px-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">All Status</option>
                            <option value="active">Active</option>
                            <option value="low">Low Stock</option>
                            <option value="out">Out of Stock</option>
                        </select>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        <button id="exportExcelBtn" class="px-3 py-2 rounded-lg bg-emerald-600 text-white text-sm hover:bg-emerald-700"><i class="fas fa-file-excel mr-1"></i>Export Excel</button>
                        <button id="exportCsvBtn" class="px-3 py-2 rounded-lg bg-sky-600 text-white text-sm hover:bg-sky-700"><i class="fas fa-file-csv mr-1"></i>Export CSV</button>
                    </div>
                </div>
            </div>
            <div id="rawSummary" class="bg-white rounded-xl shadow-md p-4 mb-6 text-sm text-gray-700"></div>

            <!-- Materials Grid -->
            <div id="materialsGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Materials will be loaded here -->
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="hidden text-center py-12">
                <i class="fas fa-box-open text-6xl text-gray-300 mb-4"></i>
                <p class="text-gray-500 text-lg">No materials found</p>
            </div>
        </main>
    </div>

    <script src="js/sidebar-nav.js"></script>
    <script>
        // Sample raw materials data
        const seedRawMaterials = [
            {
                id: 1,
                name: 'PLC Controller',
                category: 'Electronics',
                description: 'Programmable Logic Controller for automation systems',
                quantity: 48,
                unit: 'pcs',
                supplier: 'Siemens',
                location: 'Warehouse A',
                status: 'active',
                min_stock: 10,
                price: 15000,
                last_updated: '2025-03-01'
            },
            {
                id: 2,
                name: 'RFID Antenna',
                category: 'Sensors',
                description: 'Radio Frequency Identification antenna for tracking',
                quantity: 12,
                unit: 'pcs',
                supplier: 'Honeywell',
                location: 'Warehouse A',
                status: 'active',
                min_stock: 15,
                price: 2500,
                last_updated: '2025-03-02'
            },
            {
                id: 3,
                name: 'ESP32 Module',
                category: 'Electronics',
                description: 'WiFi and Bluetooth enabled microcontroller module',
                quantity: 87,
                unit: 'pcs',
                supplier: 'Espressif',
                location: 'Warehouse B',
                status: 'active',
                min_stock: 20,
                price: 450,
                last_updated: '2025-02-28'
            },
            {
                id: 4,
                name: 'Power Supply',
                category: 'Electronics',
                description: '24V DC power supply unit with regulation',
                quantity: 5,
                unit: 'pcs',
                supplier: 'Mean Well',
                location: 'Production Floor',
                status: 'low',
                min_stock: 8,
                price: 3200,
                last_updated: '2025-03-03'
            },
            {
                id: 5,
                name: 'Temperature Sensor',
                category: 'Sensors',
                description: 'Digital temperature sensor with I2C interface',
                quantity: 156,
                unit: 'pcs',
                supplier: 'Adafruit',
                location: 'Warehouse A',
                status: 'active',
                min_stock: 30,
                price: 180,
                last_updated: '2025-03-01'
            },
            {
                id: 6,
                name: 'LED Strip',
                category: 'Electronics',
                description: 'RGB LED strip for lighting applications',
                quantity: 34,
                unit: 'm',
                supplier: 'Philips',
                location: 'Warehouse B',
                status: 'active',
                min_stock: 20,
                price: 850,
                last_updated: '2025-02-27'
            }
        ];

        const RAW_STORAGE_KEY = 'rawMaterialsInventoryV2';
        const rawMaterials = JSON.parse(localStorage.getItem(RAW_STORAGE_KEY) || 'null') || seedRawMaterials;
        let filteredMaterials = [...rawMaterials];
        localStorage.setItem(RAW_STORAGE_KEY, JSON.stringify(rawMaterials));

        function getStatusBadge(material) {
            if (material.quantity === 0) {
                return '<span class="px-2 py-1 bg-red-100 text-red-800 text-xs font-semibold rounded-full">Out of Stock</span>';
            } else if (material.quantity <= material.min_stock) {
                return '<span class="px-2 py-1 bg-yellow-100 text-yellow-800 text-xs font-semibold rounded-full">Low Stock</span>';
            } else {
                return '<span class="px-2 py-1 bg-green-100 text-green-800 text-xs font-semibold rounded-full">In Stock</span>';
            }
        }

        function renderMaterials() {
            const grid = document.getElementById('materialsGrid');
            const emptyState = document.getElementById('emptyState');
            const totalQty = rawMaterials.reduce((sum, item) => sum + Number(item.quantity || 0), 0);
            const lowCount = rawMaterials.filter(item => Number(item.quantity || 0) <= Number(item.min_stock || 0)).length;
            const visibleQty = filteredMaterials.reduce((sum, item) => sum + Number(item.quantity || 0), 0);
            document.getElementById('rawSummary').innerHTML = `
                <strong>Raw Summary:</strong> Total materials <strong>${rawMaterials.length}</strong>, combined quantity <strong>${totalQty}</strong>, 
                low stock <strong>${lowCount}</strong>, visible filtered quantity <strong>${visibleQty}</strong>.
            `;

            if (filteredMaterials.length === 0) {
                grid.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            grid.classList.remove('hidden');
            emptyState.classList.add('hidden');

            grid.innerHTML = filteredMaterials.map(material => `
                <div class="bg-white rounded-xl shadow-md hover:shadow-xl transition p-6">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="text-xl font-bold text-gray-800">${material.name}</h3>
                            <p class="text-sm text-gray-500">${material.category}</p>
                        </div>
                        ${getStatusBadge(material)}
                    </div>

                    <p class="text-gray-600 text-sm mb-4">${material.description}</p>

                    <div class="grid grid-cols-2 gap-4 mb-4 text-sm">
                        <div>
                            <p class="text-gray-500">Quantity</p>
                            <p class="font-semibold text-lg text-blue-600">${material.quantity} ${material.unit}</p>
                        </div>
                        <div>
                            <p class="text-gray-500">Min Stock</p>
                            <p class="font-semibold">${material.min_stock} ${material.unit}</p>
                        </div>
                        <div>
                            <p class="text-gray-500">Supplier</p>
                            <p class="font-semibold">${material.supplier}</p>
                        </div>
                        <div>
                            <p class="text-gray-500">Location</p>
                            <p class="font-semibold">${material.location}</p>
                        </div>
                    </div>

                    <div class="border-t pt-4 flex justify-between items-center">
                        <div>
                            <p class="text-xs text-gray-500">Unit Price</p>
                            <p class="font-bold text-green-600">₹${material.price.toLocaleString()}</p>
                        </div>
                        <div>
                            <p class="text-xs text-gray-500">Last Updated</p>
                            <p class="text-xs font-semibold">${material.last_updated}</p>
                        </div>
                    </div>

                    <div class="mt-4 flex gap-2">
                        <button class="flex-1 bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition text-sm">
                            <i class="fas fa-edit mr-1"></i> Edit
                        </button>
                        <button class="px-4 bg-gray-200 text-gray-700 py-2 rounded-lg hover:bg-gray-300 transition text-sm">
                            <i class="fas fa-info-circle"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function applyFilters() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('categoryFilter').value;
            const status = document.getElementById('statusFilter').value;

            filteredMaterials = rawMaterials.filter(material => {
                const matchesSearch = material.name.toLowerCase().includes(searchTerm) ||
                                    material.description.toLowerCase().includes(searchTerm) ||
                                    material.supplier.toLowerCase().includes(searchTerm);
                
                const matchesCategory = !category || material.category === category;
                
                let matchesStatus = true;
                if (status === 'active') matchesStatus = material.quantity > material.min_stock;
                else if (status === 'low') matchesStatus = material.quantity > 0 && material.quantity <= material.min_stock;
                else if (status === 'out') matchesStatus = material.quantity === 0;

                return matchesSearch && matchesCategory && matchesStatus;
            });

            renderMaterials();
        }

        function exportExcel() {
            const worksheet = XLSX.utils.json_to_sheet(filteredMaterials);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, 'Raw Materials');
            XLSX.writeFile(workbook, 'raw-materials.xlsx');
        }

        function exportCsv() {
            const csv = Papa.unparse(filteredMaterials);
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'raw-materials.csv';
            link.click();
            URL.revokeObjectURL(url);
        }

        function initThemeToggle() {
            const body = document.body;
            const toggleBtn = document.getElementById('themeToggleBtn');
            const toggleIcon = document.getElementById('themeToggleIcon');
            const storedTheme = localStorage.getItem('themeMode') || 'light';
            if (storedTheme === 'dark') body.classList.add('dark-mode');
            toggleIcon.className = body.classList.contains('dark-mode') ? 'fas fa-sun' : 'fas fa-moon';
            toggleBtn?.addEventListener('click', () => {
                body.classList.toggle('dark-mode');
                const dark = body.classList.contains('dark-mode');
                localStorage.setItem('themeMode', dark ? 'dark' : 'light');
                toggleIcon.className = dark ? 'fas fa-sun' : 'fas fa-moon';
            });
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('categoryFilter').addEventListener('change', applyFilters);
        document.getElementById('statusFilter').addEventListener('change', applyFilters);
        document.getElementById('exportExcelBtn').addEventListener('click', exportExcel);
        document.getElementById('exportCsvBtn').addEventListener('click', exportCsv);

        // Sidebar toggle
        document.getElementById('menuToggle')?.addEventListener('click', () => {
            document.querySelector('.sidebar').classList.toggle('active');
        });
        document.getElementById('closeSidebar')?.addEventListener('click', () => {
            document.querySelector('.sidebar').classList.remove('active');
        });

        // Login protection
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }

        const username = localStorage.getItem('username') || 'User';
        document.getElementById('username').textContent = username.charAt(0).toUpperCase() + username.slice(1);
        const userMenuButton = document.getElementById('userMenuButton');
        const userMenu = document.getElementById('userMenu');
        const logoutBtn = document.getElementById('logoutBtn');
        userMenuButton?.addEventListener('click', (event) => {
            event.stopPropagation();
            userMenu.classList.toggle('hidden');
        });
        document.addEventListener('click', () => userMenu?.classList.add('hidden'));
        logoutBtn?.addEventListener('click', () => {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('username');
            localStorage.removeItem('loginTime');
            window.location.href = 'login.html';
        });

        // Optional logout trigger if legacy user avatar exists
        const legacyUserTrigger = document.querySelector('img[alt="User"]')?.parentElement;
        legacyUserTrigger?.addEventListener('click', function() {
            if (confirm('Do you want to logout?')) {
                localStorage.removeItem('isLoggedIn');
                localStorage.removeItem('username');
                window.location.href = 'login.html';
            }
        });

        // Initial render
        renderMaterials();
        initThemeToggle();
    </script>
</body>
</html>
