<!DOCTYPE html>
<html lang="en">
<head>

    @media (max-width:767px){

      .sidebar.app-sidebar.active{left:0;}
      body.sidebar-collapsed .sidebar.app-sidebar .nav-label,body.sidebar-collapsed .sidebar.app-sidebar .sidebar-title{opacity:1;max-width:none;}
    }
    @media (min-width:768px){
      .app-sidebar{width:16rem;min-width:16rem;flex-shrink:0;overflow:hidden;}
      .nav-label{transition:opacity .15s ease,max-width .2s ease,margin .2s ease;max-width:12rem;overflow:hidden;white-space:nowrap;}
      .sidebar-title{transition:opacity .15s ease,max-width .2s ease;max-width:12rem;overflow:hidden;}
      body.sidebar-collapsed .app-sidebar{width:4.5rem;min-width:4.5rem;padding-left:.5rem;padding-right:.5rem;}
      body.sidebar-collapsed .app-sidebar .sidebar-title{opacity:0;max-width:0;pointer-events:none;}
      body.sidebar-collapsed .app-sidebar .nav-label{opacity:0;max-width:0;margin-left:0;}
      body.sidebar-collapsed .app-sidebar .nav-link{justify-content:center;}
      body.sidebar-collapsed .app-sidebar .nav-icon{margin-right:0!important;}
      body.sidebar-collapsed #sidebarCollapse .sidebar-collapse-icon-expanded{display:none!important;}
      body.sidebar-collapsed #sidebarCollapse .sidebar-collapse-icon-collapsed{display:inline-block!important;}
      body:not(.sidebar-collapsed) #sidebarCollapse .sidebar-collapse-icon-collapsed{display:none!important;}
    }
    #sidebarCollapse .sidebar-collapse-icon-collapsed{display:none!important;}
    .theme-toggle-btn{display:inline-flex;align-items:center;justify-content:center;width:2.25rem;height:2.25rem;border-radius:.5rem;border:1px solid rgba(255,255,255,.35);background:rgba(255,255,255,.14);color:#fff;}
    .theme-toggle-btn:hover{background:rgba(255,255,255,.24);}
    body.dark-mode{background-color:#0b1220!important;color:#d1d5db;}
    body.dark-mode .bg-white{background-color:#1f2937!important;color:#d1d5db!important;}
    body.dark-mode .bg-gray-50,body.dark-mode .bg-gray-100{background-color:#111827!important;color:#d1d5db!important;}
    body.dark-mode .text-gray-800,body.dark-mode .text-gray-700,body.dark-mode .text-gray-600,body.dark-mode .text-gray-500{color:#d1d5db!important;}

<body class="bg-gray-50">

<!-- Header -->

</div>

  function init(){
    if(window.matchMedia('(min-width:768px)').matches)applyCollapsed(localStorage.getItem(KEY)==='1');
    document.getElementById('sidebarCollapse')?.addEventListener('click',function(){var next=!document.body.classList.contains('sidebar-collapsed');applyCollapsed(next);localStorage.setItem(KEY,next?'1':'0');});
    window.addEventListener('resize',function(){if(!window.matchMedia('(min-width:768px)').matches)document.body.classList.remove('sidebar-collapsed');else applyCollapsed(localStorage.getItem(KEY)==='1');});

  document.readyState==='loading'?document.addEventListener('DOMContentLoaded',init):init();
})();

// ── Avatar initials ──
function avatar(name=''){
  const parts=(name||'?').split(' ').filter(Boolean);
  const initials=parts.length>1?parts[0][0]+parts[parts.length-1][0]:parts[0]?parts[0][0]:'?';
  const colors=['bg-blue-500','bg-emerald-500','bg-purple-500','bg-amber-500','bg-rose-500','bg-sky-500','bg-teal-500'];
  const color=colors[name.charCodeAt(0)%colors.length];
  return `<div class="w-10 h-10 rounded-full ${color} text-white flex items-center justify-center font-bold text-sm shrink-0">${initials.toUpperCase()}</div>`;
}

function applyFilters(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const st=document.getElementById('statusFilter').value;
  filteredClients=allClients.filter(c=>{
    const hay=`${c.client_name||''} ${c.company_name||''} ${c.phone||''} ${c.email||''} ${c.address||''} ${c.gst_no||''}`.toLowerCase();
    return(!q||hay.includes(q))&&(!st||c.status===st);
  });
  const active=allClients.filter(c=>(c.status||'').toLowerCase()==='active').length;
  document.getElementById('clientSummary').innerHTML=
    `<strong>Summary:</strong> Total clients <strong>${allClients.length}</strong> &bull; Active <strong class="text-green-600">${active}</strong> &bull; Inactive <strong class="text-gray-500">${allClients.length-active}</strong> &bull; Showing <strong>${filteredClients.length}</strong>`;
  renderCards();
  renderTable();
}

function renderCards(){
  document.getElementById('cardsGrid').innerHTML=filteredClients.map(c=>`
    <article class="bg-white rounded-xl shadow hover:shadow-lg transition border border-gray-100 p-4 fade-in">
      <div class="flex items-center gap-3 mb-3">
        ${avatar(c.client_name||c.company_name||'?')}
        <div class="min-w-0">
          <h3 class="font-bold text-gray-800 truncate">${c.client_name||'—'}</h3>
          <p class="text-xs text-gray-400 truncate">${c.company_name||'—'}</p>
        </div>
        <span class="ml-auto text-xs px-2 py-1 rounded-full shrink-0 ${c.status==='active'?'bg-green-100 text-green-700':'bg-gray-200 text-gray-500'}">${c.status}</span>
      </div>
      <div class="space-y-1.5 text-xs text-gray-500">
        <div class="flex items-center gap-2"><i class="fas fa-phone text-blue-400 w-4"></i><a href="tel:${c.phone}" class="hover:text-blue-600">${c.phone||'—'}</a></div>
        <div class="flex items-center gap-2"><i class="fas fa-envelope text-blue-400 w-4"></i><a href="mailto:${c.email}" class="hover:text-blue-600 truncate">${c.email||'—'}</a></div>
        <div class="flex items-center gap-2"><i class="fas fa-location-dot text-blue-400 w-4"></i><span>${c.address||'—'}</span></div>
        ${c.gst_no?`<div class="flex items-center gap-2"><i class="fas fa-receipt text-blue-400 w-4"></i><span>${c.gst_no}</span></div>`:''}
      </div>
      <div class="mt-4 flex gap-2">
        <button data-edit="${c.id}" class="flex-1 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700"><i class="fas fa-edit mr-1"></i>Edit</button>
        <button data-delete="${c.id}" class="px-4 bg-red-50 text-red-500 py-2 rounded-lg text-sm hover:bg-red-100"><i class="fas fa-trash"></i></button>
      </div>
    </article>
  `).join('');
}

function renderTable(){
  document.getElementById('clientTableBody').innerHTML=filteredClients.map(c=>`
    <tr class="border-t hover:bg-gray-50">
      <td class="px-3 py-2 text-gray-400 text-xs">${c.id}</td>
      <td class="px-3 py-2"><input data-id="${c.id}" data-field="client_name" value="${c.client_name||''}" class="w-full border rounded px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-blue-400 min-w-[120px]"></td>
      <td class="px-3 py-2"><input data-id="${c.id}" data-field="company_name" value="${c.company_name||''}" class="w-full border rounded px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-blue-400 min-w-[140px]"></td>
      <td class="px-3 py-2"><input data-id="${c.id}" data-field="phone" value="${c.phone||''}" class="w-full border rounded px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-blue-400 min-w-[100px]"></td>
      <td class="px-3 py-2"><input data-id="${c.id}" data-field="email" value="${c.email||''}" class="w-full border rounded px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-blue-400 min-w-[160px]"></td>
      <td class="px-3 py-2"><input data-id="${c.id}" data-field="address" value="${c.address||''}" class="w-full border rounded px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-blue-400 min-w-[100px]"></td>
      <td class="px-3 py-2"><input data-id="${c.id}" data-field="gst_no" value="${c.gst_no||''}" class="w-full border rounded px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-blue-400 min-w-[100px]"></td>
      <td class="px-3 py-2">
        <select data-id="${c.id}" data-field="status" class="border rounded px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-blue-400">
          <option value="active" ${c.status==='active'?'selected':''}>active</option>
          <option value="inactive" ${c.status==='inactive'?'selected':''}>inactive</option>
        </select>
      </td>
      <td class="px-3 py-2 text-xs text-gray-400 whitespace-nowrap">${new Date(c.created_at||Date.now()).toLocaleDateString('en-IN')}</td>
      <td class="px-3 py-2">
        <button data-delete="${c.id}" class="text-red-500 hover:text-red-700 text-xs px-2 py-1 border border-red-200 rounded hover:bg-red-50"><i class="fas fa-trash"></i></button>
      </td>
    </tr>
  `).join('');
}

// ── Modal ──
function openModal(c=null){
  document.getElementById('modalTitle').textContent=c?'Edit Client':'Add Client';
  document.getElementById('clientId').value=c?.id||'';
  document.getElementById('clientName').value=c?.client_name||'';
  document.getElementById('companyName').value=c?.company_name||'';
  document.getElementById('phone').value=c?.phone||'';
  document.getElementById('email').value=c?.email||'';
  document.getElementById('address').value=c?.address||'';
  document.getElementById('gstNo').value=c?.gst_no||'';
  document.getElementById('statusInput').value=c?.status||'active';
  document.getElementById('clientModal').classList.remove('hidden');
}
function closeModal(){document.getElementById('clientModal').classList.add('hidden');}

document.getElementById('saveClientBtn').addEventListener('click',()=>{
  const name=document.getElementById('clientName').value.trim();
  if(!name){alert('Client name is required');return;}
  const id=document.getElementById('clientId').value;
  const payload={
    client_name:name,company_name:document.getElementById('companyName').value.trim(),
    phone:document.getElementById('phone').value.trim(),email:document.getElementById('email').value.trim(),
    address:document.getElementById('address').value.trim(),gst_no:document.getElementById('gstNo').value.trim(),
    status:document.getElementById('statusInput').value
  };
  if(id){allClients=allClients.map(c=>c.id===Number(id)?{...c,...payload}:c);}
  else{allClients.unshift({id:nextId(),...payload,created_at:new Date().toISOString()});}
  save();applyFilters();closeModal();
});
document.getElementById('closeModalBtn').addEventListener('click',closeModal);
document.getElementById('cancelModalBtn').addEventListener('click',closeModal);
document.getElementById('clientModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

// ── Cards events ──
document.getElementById('cardsGrid').addEventListener('click',e=>{
  const eb=e.target.closest('[data-edit]'),db=e.target.closest('[data-delete]');
  if(eb)openModal(allClients.find(c=>c.id===Number(eb.dataset.edit)));
  if(db&&confirm('Delete this client?')){allClients=allClients.filter(c=>c.id!==Number(db.dataset.delete));save();applyFilters();}
});

// ── Table inline edit ──
document.getElementById('clientTableBody').addEventListener('change',e=>{
  const t=e.target.closest('[data-id][data-field]');if(!t)return;
  const id=Number(t.dataset.id),field=t.dataset.field;
  allClients=allClients.map(c=>c.id===id?{...c,[field]:t.value}:c);save();applyFilters();
});
document.getElementById('clientTableBody').addEventListener('click',e=>{
  const db=e.target.closest('[data-delete]');
  if(db&&confirm('Delete?')){allClients=allClients.filter(c=>c.id!==Number(db.dataset.delete));save();applyFilters();}
});

// ── Controls ──
document.getElementById('addClientBtn').addEventListener('click',()=>openModal());
document.getElementById('searchInput').addEventListener('input',applyFilters);
document.getElementById('statusFilter').addEventListener('change',applyFilters);

// ── Exports ──
document.getElementById('exportExcelBtn').addEventListener('click',()=>{
  const ws=XLSX.utils.json_to_sheet(filteredClients);const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Clients');XLSX.writeFile(wb,'clients.xlsx');
});
document.getElementById('exportCsvBtn').addEventListener('click',()=>{
  const csv=Papa.unparse(filteredClients);
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([csv],{type:'text/csv'})),download:'clients.csv'});
  a.click();
});
document.getElementById('exportPdfBtn').addEventListener('click',()=>{
  const {jsPDF}=window.jspdf;const doc=new jsPDF('l','mm','a4');
  doc.setFontSize(14);doc.text('S2R2 Technologies – Client Directory',14,15);
  doc.autoTable({
    startY:22,head:[['#','Client Name','Company','Phone','Email','Address','Status']],
    body:filteredClients.map(c=>[c.id,c.client_name||'',c.company_name||'',c.phone||'',c.email||'',c.address||'',c.status||'']),
    theme:'striped',headStyles:{fillColor:[0,91,234]},styles:{fontSize:8}
  });
  doc.save('clients.pdf');
});
document.getElementById('printBtn').addEventListener('click',()=>{
  const rows=filteredClients.map((c,i)=>`<tr><td>${i+1}</td><td>${c.client_name||''}</td><td>${c.company_name||''}</td><td>${c.phone||''}</td><td>${c.email||''}</td><td>${c.address||''}</td><td>${c.status||''}</td></tr>`).join('');
  const win=window.open('','_blank');
  win.document.write(`<html><head><title>Clients – S2R2</title><style>body{font-family:Arial,sans-serif;padding:20px}table{width:100%;border-collapse:collapse;font-size:11px}th,td{border:1px solid #ccc;padding:6px 8px;text-align:left}th{background:#005bea;color:#fff}tr:nth-child(even){background:#f3f8ff}h2{color:#005bea}</style></head><body><h2>S2R2 Technologies – Client Directory</h2><table><thead><tr><th>#</th><th>Name</th><th>Company</th><th>Phone</th><th>Email</th><th>Address</th><th>Status</th></tr></thead><tbody>${rows}</tbody></table></body></html>`);
  win.document.close();win.print();
});

// ── Import CSV ──
document.getElementById('importBtn').addEventListener('click',()=>document.getElementById('importInput').click());
document.getElementById('importInput').addEventListener('change',e=>{
  const file=e.target.files[0];if(!file)return;
  Papa.parse(file,{header:true,skipEmptyLines:true,complete:result=>{
    const imported=result.data.map((row,i)=>({
      id:nextId()+i,
      client_name:row.client_name||row['Client Name']||row.name||'',
      company_name:row.company_name||row['Company Name']||row.company||'',
      phone:row.phone||row.Phone||row.mobile||'',
      email:row.email||row.Email||'',
      address:row.address||row.Address||row.area||'',
      gst_no:row.gst_no||row.GST||row.gst||'',
      status:row.status||'active',
      created_at:new Date().toISOString()
    })).filter(c=>c.client_name||c.company_name);
    allClients=[...allClients,...imported];
    save();applyFilters();
    alert(`✅ Imported ${imported.length} clients successfully.`);
    e.target.value='';
  }});
});

applyFilters();
</script>
</body>
</html>
