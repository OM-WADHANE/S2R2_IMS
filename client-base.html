        async function fetchClients() {
            if (window.location.protocol === 'file:') {
                allClients = JSON.parse(localStorage.getItem(CLIENT_STORAGE_KEY) || '[]');
                applyFilters();
                return;
            }
            try {
                const response = await fetch('/api/clients');
                const data = await response.json();
                allClients = data.clients || [];
                localStorage.setItem(CLIENT_STORAGE_KEY, JSON.stringify(allClients));
                applyFilters();
            } catch (error) {
                allClients = JSON.parse(localStorage.getItem(CLIENT_STORAGE_KEY) || '[]');
                applyFilters();
            }
        }

        function applyFilters() {
            const q = byId('searchInput').value.trim().toLowerCase();
            const status = byId('statusFilter').value;

                const hay = `${c.client_name} ${c.company_name} ${c.phone} ${c.email} ${c.address} ${c.gst_no}`.toLowerCase();
                return (!q || hay.includes(q)) && (!status || c.status === status);

            document.getElementById('clientSummary').innerHTML = `

            renderCards();
            renderTable();

        async function createOrUpdateClient(payload, id = '') {
            if (window.location.protocol === 'file:') {
                if (id) {
                    allClients = allClients.map(item => item.id === Number(id) ? { ...item, ...payload } : item);
                } else {
                    const nextId = allClients.length ? Math.max(...allClients.map(item => Number(item.id) || 0)) + 1 : 1;
                    allClients.unshift({ id: nextId, ...payload, created_at: new Date().toISOString() });
                }
                localStorage.setItem(CLIENT_STORAGE_KEY, JSON.stringify(allClients));
                return { success: true };
            }
            const method = id ? 'PUT' : 'POST';
            const url = id ? `/api/clients/${id}` : '/api/clients';
            const response = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (!response.ok) throw new Error('Save failed');
            return response.json();
        }

        async function removeClient(id) {
            if (window.location.protocol === 'file:') {
                allClients = allClients.filter(item => item.id !== id);
                localStorage.setItem(CLIENT_STORAGE_KEY, JSON.stringify(allClients));
                return;
            }
            const response = await fetch(`/api/clients/${id}`, { method: 'DELETE' });
            if (!response.ok) throw new Error('Delete failed');
        }

        function exportCsv() {
            const csv = Papa.unparse(filteredClients);

            link.href = url;
            link.download = 'clients.csv';
            link.click();
            URL.revokeObjectURL(url);
        }

        function normalizeImportedClient(row, index) {
            const getValue = (obj, keys) => {
                for (const key of keys) {
                    if (obj[key] !== undefined && obj[key] !== null && String(obj[key]).trim() !== '') return String(obj[key]).trim();
                    const matchKey = Object.keys(obj).find(k => k.toLowerCase() === key.toLowerCase());
                    if (matchKey && String(obj[matchKey]).trim() !== '') return String(obj[matchKey]).trim();
                }
                return '';
            };

            return {
                id: Number(getValue(row, ['id'])) || (Date.now() + index),
                client_name: getValue(row, ['client_name', 'client name', 'name']),
                company_name: getValue(row, ['company_name', 'company name', 'company']),
                phone: getValue(row, ['phone', 'mobile']),
                email: getValue(row, ['email', 'mail']),
                address: getValue(row, ['address', 'area', 'location']),
                gst_no: getValue(row, ['gst_no', 'gst', 'gst no']),
                status: (getValue(row, ['status']) || 'active').toLowerCase(),
                created_at: getValue(row, ['created_at', 'created at']) || new Date().toISOString()
            };
        }

        async function importClientsFromFile(file) {
            const ext = file.name.toLowerCase().split('.').pop();
            if (ext === 'csv') {
                const text = await file.text();
                const parsed = Papa.parse(text, { header: true, skipEmptyLines: true });
                return (parsed.data || []).map((row, index) => normalizeImportedClient(row, index))
                    .filter(client => client.client_name || client.company_name || client.email || client.phone);
            }

            const buffer = await file.arrayBuffer();
            const workbook = XLSX.read(buffer, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });
            return rows.map((row, index) => normalizeImportedClient(row, index))
                .filter(client => client.client_name || client.company_name || client.email || client.phone);
        }

        async function getLogoDataUrl() {
            return new Promise((resolve) => {
                const image = new Image();
                image.crossOrigin = 'anonymous';
                image.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = image.width;
                    canvas.height = image.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(image, 0, 0);
                    resolve(canvas.toDataURL('image/png'));
                };
                image.onerror = () => resolve(null);
                image.src = '/images/s2r2-logo.jpg';
            });
        }

        function initThemeToggle() {
            const body = document.body;
            const toggleBtn = document.getElementById('themeToggleBtn');
            const toggleIcon = document.getElementById('themeToggleIcon');
            const storedTheme = localStorage.getItem('themeMode') || 'light';
            if (storedTheme === 'dark') body.classList.add('dark-mode');
            toggleIcon.className = body.classList.contains('dark-mode') ? 'fas fa-sun' : 'fas fa-moon';
            toggleBtn?.addEventListener('click', () => {
                body.classList.toggle('dark-mode');
                const dark = body.classList.contains('dark-mode');
                localStorage.setItem('themeMode', dark ? 'dark' : 'light');
                toggleIcon.className = dark ? 'fas fa-sun' : 'fas fa-moon';
            });
        }

        async function exportSingleClientPdf(clientId) {
            const client = filteredClients.find(c => c.id === clientId) || allClients.find(c => c.id === clientId);
            if (!client) return;
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            const logoDataUrl = await getLogoDataUrl();
            if (logoDataUrl) pdf.addImage(logoDataUrl, 'PNG', 150, 10, 40, 20);
            pdf.setFontSize(14);
            pdf.text('Inventory Management System | S2R2', 14, 16);
            pdf.setFontSize(11);
            pdf.text(`Generated: ${new Date().toLocaleString()}`, 14, 24);
            const entries = [
                ['Client Name', client.client_name || '-'],
                ['Company', client.company_name || '-'],
                ['Phone', client.phone || '-'],
                ['Email', client.email || '-'],
                ['Address', client.address || '-'],
                ['GST No', client.gst_no || '-'],
                ['Status', client.status || '-']
            ];
            let y = 38;
            entries.forEach(([k, v]) => { pdf.text(`${k}: ${v}`, 14, y); y += 8; });
            pdf.save(`client-${client.id}.pdf`);
        }

        async function exportAllClientsPdf() {
            let payload;
            if (window.location.protocol === 'file:') {
                payload = { clients: filteredClients, generated_at: new Date().toISOString() };
            } else {
                const response = await fetch('/api/clients/export/pdf');
                payload = await response.json();
            }
            const rows = (payload.clients || []).map(c => [c.id, c.client_name, c.company_name, c.phone, c.email, c.status]);
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            const logoDataUrl = await getLogoDataUrl();
            if (logoDataUrl) doc.addImage(logoDataUrl, 'PNG', 150, 8, 40, 20);
            doc.setFontSize(14);
            doc.text('Inventory Management System | S2R2', 14, 14);
            doc.setFontSize(10);
            doc.text(`Generated: ${new Date(payload.generated_at || Date.now()).toLocaleString()}`, 14, 21);
            doc.autoTable({
                startY: 28,
                head: [['ID', 'Client Name', 'Company', 'Phone', 'Email', 'Status']],
                body: rows,
                styles: { fontSize: 8 },
                didDrawPage: (data) => {
                    doc.setFontSize(8);
                    doc.text(`Page ${doc.internal.getNumberOfPages()}`, data.settings.margin.left, doc.internal.pageSize.height - 5);
                }
            });
            doc.save('clients-all.pdf');
        }

        byId('clientForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            const payload = {
                client_name: byId('clientName').value.trim(),
                company_name: byId('companyName').value.trim(),
                phone: byId('phone').value.trim(),
                email: byId('email').value.trim(),
                address: byId('address').value.trim(),
                gst_no: byId('gstNo').value.trim(),
                status: byId('status').value
            };
            const id = byId('clientId').value;
            await createOrUpdateClient(payload, id);
            closeModal();
            await fetchClients();
        });

        byId('cardsGrid').addEventListener('click', (event) => {
            const editId = Number(event.target.closest('[data-edit-id]')?.dataset.editId);
            const pdfId = Number(event.target.closest('[data-pdf-id]')?.dataset.pdfId);
            if (editId) openModal(allClients.find(c => c.id === editId));
            if (pdfId) exportSingleClientPdf(pdfId);
        });

        tableBody.addEventListener('change', async (event) => {
            const target = event.target.closest('[data-inline-id]');
            if (!target) return;
            const id = Number(target.dataset.inlineId);
            const field = target.dataset.field;
            await createOrUpdateClient({ [field]: target.value }, id);
            await fetchClients();
        });

        tableBody.addEventListener('click', async (event) => {
            const deleteId = Number(event.target.closest('[data-delete-id]')?.dataset.deleteId);
            if (!deleteId) return;
            if (!confirm('Delete this client?')) return;
            await removeClient(deleteId);
            await fetchClients();
        });

        byId('searchInput').addEventListener('input', applyFilters);
        byId('statusFilter').addEventListener('change', applyFilters);
        byId('addClientBtn').addEventListener('click', () => openModal(null));
        byId('closeModalBtn').addEventListener('click', closeModal);
        byId('cancelBtn').addEventListener('click', closeModal);
        byId('exportExcelBtn').addEventListener('click', exportExcel);
        byId('importClientsBtn').addEventListener('click', () => byId('importClientsInput').click());
        byId('importClientsInput').addEventListener('change', async (event) => {
            const file = event.target.files?.[0];
            if (!file) return;
            const importedClients = await importClientsFromFile(file);
            const existingEmails = new Set(allClients.map(client => (client.email || '').toLowerCase()).filter(Boolean));
            const merged = [...allClients];
            importedClients.forEach((client) => {
                const emailKey = (client.email || '').toLowerCase();
                if (emailKey && existingEmails.has(emailKey)) return;
                merged.push(client);
                if (emailKey) existingEmails.add(emailKey);
            });
            allClients = merged;
            localStorage.setItem(CLIENT_STORAGE_KEY, JSON.stringify(allClients));
            applyFilters();
            event.target.value = '';
        });
        byId('exportAllPdfBtn').addEventListener('click', exportAllClientsPdf);
        byId('printBtn').addEventListener('click', () => window.print());

        document.getElementById('menuToggle')?.addEventListener('click', () => document.querySelector('.sidebar').classList.toggle('active'));
        document.getElementById('closeSidebar')?.addEventListener('click', () => document.querySelector('.sidebar').classList.remove('active'));

        if (localStorage.getItem('isLoggedIn') !== 'true') window.location.href = 'login.html';
        const username = localStorage.getItem('username') || 'User';
        byId('username').textContent = username.charAt(0).toUpperCase() + username.slice(1);
        const userMenuButton = byId('userMenuButton');
        const userMenu = byId('userMenu');
        const logoutBtn = byId('logoutBtn');
        userMenuButton?.addEventListener('click', (event) => {
            event.stopPropagation();
            userMenu.classList.toggle('hidden');
        });
        document.addEventListener('click', () => userMenu?.classList.add('hidden'));
        logoutBtn?.addEventListener('click', () => {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('username');
            localStorage.removeItem('loginTime');
            window.location.href = 'login.html';
        });

        if (!allClients.length) {
            allClients = LEGACY_CLIENTS.map((client, index) => ({ ...client, id: index + 1 }));
            localStorage.setItem(CLIENT_STORAGE_KEY, JSON.stringify(allClients));
        }
        fetchClients();
        setInterval(fetchClients, 15000);
        initThemeToggle();
    </script>
</body>
</html>
